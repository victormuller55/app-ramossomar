workflows:
  testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 120

    integrations:
      app_store_connect: RamosSomar

    environment:
      flutter: 3.41.7
      xcode: 26.0
      cocoapods: default

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.net.convertix.ramossomar

      vars:
        APP_STORE_APPLE_ID: "6789649696"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Log ambiente
        script: |
          echo "=== Codemagic Environment ==="
          echo "Branch: $CM_BRANCH"
          echo "Commit: $CM_COMMIT"
          flutter --version
          xcodebuild -version

      - name: Flutter Clean
        script: |
          flutter clean
          flutter pub get

      - name: Analyze
        script: |
          flutter analyze --no-fatal-infos || true

      - name: Run Tests
        script: |
          flutter test

      - name: Set Version
        script: |
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//' | tr -d '[:space:]')
          BUILD_NUMBER=${PROJECT_BUILD_NUMBER}

          echo "VERSION_NAME=$VERSION_NAME" >> $CM_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV

          echo "Building $VERSION_NAME+$BUILD_NUMBER"

      - name: Install CocoaPods
        script: |
          cd ios
          pod repo update
          pod install
          cd ..

      - name: Configure iOS Code Signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa \
            --release \
            --build-name="$VERSION_NAME" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true