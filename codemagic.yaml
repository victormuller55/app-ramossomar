workflows:
  testflight:
    name: iOS TestFlight

    instance_type: mac_mini_m2
    max_build_duration: 120

    integrations:
      app_store_connect: Codemagic

    environment:
      flutter: 3.41.7
      xcode: 26.0
      cocoapods: default

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.net.convertix.ramossomar

      vars:
        APP_STORE_APPLE_ID: "6789649696"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Environment
        script: |
          echo "=============================="
          echo "Branch........: $CM_BRANCH"
          echo "Commit........: $CM_COMMIT"
          echo "Build ID......: $CM_BUILD_ID"
          echo "Workflow......: $CM_WORKFLOW_ID"
          echo "=============================="

          flutter --version
          xcodebuild -version

      - name: Flutter Clean
        script: |
          flutter clean
          flutter pub get

      - name: Analyze
        script: |
          flutter analyze --no-fatal-infos || true

      - name: Tests
        script: |
          flutter test

      - name: Configure Version
        script: |
          VERSION_NAME=$(grep '^version:' pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1)

          if [ -n "$CM_BUILD_ID" ]; then
            BUILD_NUMBER=$CM_BUILD_ID
          else
            BUILD_NUMBER=$(date +%s)
          fi

          echo "VERSION_NAME=$VERSION_NAME" >> $CM_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV

          echo ""
          echo "App Version : $VERSION_NAME"
          echo "Build Number: $BUILD_NUMBER"
          echo ""

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Configure Code Signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa \
            --release \
            --build-name="$VERSION_NAME" \
            --build-number="$BUILD_NUMBER" \
            --no-tree-shake-icons \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true